<!DOCTYPE html>

<html>
	<head>
		<title>Ingresar libro</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
		
		<meta charset="UTF-8">
		
		
	</head>
	
	<body class="bg-black">

		<header>
			<div class="conteiner-fluid text-white bg-dark">
				<div class="row align-items-center">
					<div class="col-3"></div>
					
				<div class="col-6 text-white text-center">
					<h1>Formulario de solicitud de libros</h1>
				</div>
				
				<div class="col-3 text-end p-3">
					<img  width="50" height="70" src="img/logo.png">
				</div>
			</div>
			<nav class="navbar-expand-sm">
				<div class="container">
					<ul class="navbar-nav text-white justify-content-center">
						<li class="nav-item"><a class="nav-link" href="Index.html">Volver al índice</a></li>
					</ul>
				</div>
			</nav>
		</header>
		
		<main>
			<div class="container-fluid bg-black p-3">
				<form class="bg-dark text-white rounded-3 py-3">
					<!--Nombre de la persona-->
					<div class="m-3">
						<label class="form-label" for="nombre">Nombre completo</label>
						<input id="nombre" class="form-control" type="text" placeholder="Ingrese su nombre completo" required>
					</div>
					<!--Correo de la persona-->
					<div class="m-3">
						<label class="form-label" for="correo">Correo electrónico</label>
						<input id="correo" class="form-control" type="text" placeholder="micorreo@dominio.com" required>
					</div>
					<!--Nombre del libro-->
					<div class="m-3">
						<label class="form-label" for="titulo">Titulo del libro</label>
						<input id="titulo" class="form-control" type="text" placeholder="Ingrese el título del libro" required>
					</div>
					<!--Autor del libro-->
					<div class="m-3">
						<label class="form-label" for="autor">Autor</label>
						<input id="autor" class="form-control" type="text" placeholder="Ingrese el nombre del autor" required>
					</div>	
					<!--Editorial-->
					<div class="m-3">
						<label class="form-label" for="editorial">Editorial</label>
						<input id="editorial" class="form-control" type="text" placeholder="Ingrese la editorial del libro">
					</div>
					<!--Año edicion-->
					<div class="m-3">
						<label class="form-label" for="edicion">Año de edición del libro</label>
						<input id="edicion" class="form-control" type="number" min="1000" max="2026">
					</div>
					<!--Nombre del género-->
					<div class="m-3">
						<label class="form-label">Genero</lable>
						<select class="form-select">
							<option selected disabled value="">Selecciona el genero del libro</option>
							<option value="AFG">Académico</option>
							<option value="ALB">Novela</option>
							<option value="ALG">Historia</option>
							<option value="ARG">Policial</option>
							<option value="BRS">Obra de teatro</option>
							<option value="BOL">Drama</option>
							<option value="CHL">Poesía</option>
							<option value="COL">Terror</option>
							<option value="ECU">Ciencia ficción</option>
							<option value="PAR">Idiomas</option>
							<option value="URU">Geografía</option>
							<option value="VNZ">Otro</option>
						</select>
					</div>
					<!--Terminos y condiciones-->
					<div class="m-3">
						<input class="form-check-input" type="checkbox" id="terminos">
						<label class="form-check-label" for="terminos">Acepto los <a href="https://www.argentina.gob.ar/terminos-y-condiciones" target="_blank">Términos y Condiciones</a>.</label>
					</div>	
					
					<!--FALTA BOTÓN ENVIAR-->
					<button type="submit" class="btn btn-primary d-flex flex-column mx-auto w-50">Enviar petición</button>																																																					
				</form>
			</div>
		</main>

		<footer>
			<div class="container-fluid bg-black h-100 w-100">
				<div class="bg-dark mx-3 px-3 rounded-2 text-white mt-4 bg-dark">

				   <a href="mailto:lucassantillanrg@gmail.com">Contacto</a>

			   </div>
			</div>
		</footer>	
		
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	</body>




</html>
