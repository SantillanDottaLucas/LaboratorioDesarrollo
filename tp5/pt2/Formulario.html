<!DOCTYPE html>
<html>
	<head>
		<title>Formulario</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
		<meta charset="UTF-8">
		<meta author="Santillan Dotta Lucas Tiziano">		
		
		
	</head>
	<body>
		
		<div class="container">
			<div class="row h1 m-3">
				<div class="col-12 text-center">Formulario de registro</div>
			</div>
			
			<div class="row p-3 text-primary bg-info-subtle rounded-2">
				<div class="col-12">Ud. está a punto de registrarse.</div>
			</div>
			
			<form>
				
				<div class="m-3"> <!--EL FORM-GROUP NO EXISTE EN BOOSTRAP VERSIÓN 5-->
					<label class="form-label" for="nombre">Nombre completo</label>
					<input class="form-control" type="text" placeholder="Escribe tu nombre completo" id="nombre">
				</div>
				
				<div class="m-3">
					<label class="form-label" for="correo">Correo electrónico</label>
					<input class="form-control" type="email" placeholder="ejemplo@dominio.com" id="correo">
				</div>

				<div class="m-3"> 
					<label class="form-label" for="password">Contraseña</label>
					<input class="form-control" type="text" placeholder="Crea una contraseña" id="password">
				</div>	
				
				<div class="m-3">
					<label class="form-label" for="repassword">Confirmar contraseña</label>
					<input class="form-control" type="text" placeholder="Repite la contraseña" id="repassword">
				</div>	
				
				<div class="m-3">
					<label class="form-label d-block">Género</label>
					<div class="form-check">
						<label class="form-label d-block" for="radioMasculino"><input class="form-check-input" type="radio" value="Masculino" name="genero" id="radioMasculino"> Masculino</label>
						<label class="form-label d-block" for="radioFemenino"><input class="form-check-input" type="radio" value="Femenino" name="genero" id="radioFemenino"> Femenino</label>
						<label class="form-label d-block" for="radioOtro"><input class="form-check-input" type="radio" value="Otro" name="genero" id="radioOtro"> Otro</label>
					</div>
				</div>	
				
				<div class="m-3">
					<input class="form-check-input" type="checkbox" id="terminos">
					<label class="form-check-label" for="terminos">Acepto los <a href="https://www.argentina.gob.ar/terminos-y-condiciones" target="_blank">Términos y Condiciones</a>.</label>
				</div>	
				
				<div class="m-3">
					<label class="form-label">País</lable>
					<select class="form-select">
						<option selected disabled value="">Selecciona tu país</option>
						<option value="AFG">Afganistán</option>
						<option value="ALB">Albania</option>
						<option value="ALG">Algeria</option>
						<option value="ARG">Argentina</option>
						<option value="BRS">Brasil</option>
						<option value="BOL">Bolivia</option>
						<option value="CHL">Chile</option>
						<option value="COL">Colombia</option>
						<option value="ECU">Ecuador</option>
						<option value="PAR">Paraguy</option>
						<option value="URU">Uruguay</option>
						<option value="VNZ">Venezuela</option>
					</select>
				</div>				
				<button type="submit" class="btn d-block bg-primary btn-info text-white text-center w-100">Registrarse</button>				
			</form>
		</div>
		
		
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
